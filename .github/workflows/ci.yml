name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  django-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: django_api/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run Django tests
        run: python manage.py test deslop -v 1
