name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run engine tests, build, and MCP smoke test
        run: npm run check

  engine-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Diff Node and Python engine output on shared fixtures
        run: node scripts/parity-check.mjs

  django-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: django_api/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run Django tests
        run: python manage.py test deslop -v 1
